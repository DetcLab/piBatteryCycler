<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raspi Battery Cycler | v1.0</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="container">
      <div class="header">
        <h2>⚡ Raspi Battery Cycler</h2>
        <div id="status-tag" class="ok">● En Línea</div>
      </div>

      <div class="cards-row">
        <div class="card card-tension"><small>TENSIÓN</small><div id="tension" class="valor tension">0.00 V</div></div>
        <div class="card card-intensidad"><small>INTENSIDAD</small><div id="intensidad" class="valor intensidad">0.000 A</div></div>
        <div class="card card-temperatura"><small>TEMPERATURA</small><div id="temperatura" class="valor temperatura">0.0 °C</div></div>
      </div>

      <div class="main-grid">
        <canvas id="grafica"></canvas>

        <div class="control-panel">
          <div class="estado-container">
            <div class="estado-header">
              <span class="estado-label">Estado Actual</span>
              <div id="estadoTexto" class="estado-valor ok"></div>
            </div>
            <div class="estado-body">
              <span class="estado-label">Alertas y Errores</span>
              <div id="errores">
                <span style="color: #4b5563; font-style: italic; font-size: 13px;">Sin incidencias</span>
              </div>
            </div>
          </div>
          
          <div class="btn-group">
            <button class="btn-cargar" onclick="accion('carga')">Carga</button>
            <button class="btn-descargar" onclick="accion('descarga')">Descarga</button>
            <button class="btn-reposo" onclick="accion('reposo')">Reposo</button>
          </div>
        </div>
      </div>

      <div class="section-box">
        <h3 style="margin-top:0; color: #9ca3af; font-size: 18px;">⚙ Parámetros de Configuración</h3>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px;">
          <div><label><small>I-SEGURIDAD (mA)</small></label><input id="iload" type="number" step="0.1" value="2.0"></div>
          <div><label><small>V-SEGURIDAD (V)</small></label><input id="icarga" type="number" step="0.1" value="1.5"></div>
          <div><label><small>I-DESCARGA (mA)</small></label><input id="iload" type="number" step="0.1" value="2.0"></div>
          <div><label><small>I-CARGA (mA)</small></label><input id="icarga" type="number" step="0.1" value="1.5"></div>
          <div><label><small>V-REGULACIÓN (V)</small></label><input id="vreg" type="number" step="0.01" value="4.20"></div>
          <div><label><small>I-TERMINACIÓN (mA)</small></label><input id="vterm" type="number" step="0.01" value="3.00"></div>
          <div><label><small>V-LOW (V)</small></label><input id="vreg" type="number" step="0.01" value="4.20"></div>
          <div><label><small>V-TERMINACIÓN (V)</small></label><input id="vterm" type="number" step="0.01" value="3.00"></div>
          <div><label><small>V-LOW (V)</small></label><input id="vreg" type="number" step="0.01" value="4.20"></div>
          <div><label><small>V-TERMINACIÓN (V)</small></label><input id="vterm" type="number" step="0.01" value="3.00"></div>
        </div>
        <div class="btn-save-container">
            <button class="btn-secundario" onclick="guardarConfig()">💾 Guardar Parámetros</button>
        </div>
      </div>

      <div class="section-box">
        <h3 style="margin-top:0; color: #9ca3af; font-size: 18px;">📅 Secuencia Programada (10 Ciclos)</h3>
        <div style="overflow-x: auto;">
          <table id="tablaCiclos">
            <thead>
              <tr>
                <th>Paso</th>
                <th>Modo</th>
                <th>Corriente (A)</th>
                <th>Voltaje Límite (V)</th>
                <th>Duración (min)</th>
              </tr>
            </thead>
            <tbody id="cuerpoCiclos"></tbody>
          </table>
        </div>
        <div class="btn-save-container">
            <button class="btn-secundario" onclick="guardarCiclos()">📤 Cargar Secuencia</button>
        </div>
      </div>
    </div>
      <script src="{{ url_for('static', filename='js/funciones.js') }}"></script>
</body>
</html>
